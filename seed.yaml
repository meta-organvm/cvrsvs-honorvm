  - type: schema-package
    description: "JSON Schema definitions for seed-v1, governance-rules formats"
    consumers: [ALL]
  - type: interop-adapters
    description: "Import/export adapters for publiccode.yml and Backstage catalog-info.yaml"
    consumers: [ALL]

consumes:
  - type: governance-source
    source: META-ORGANVM
    description: "Extracts governance primitives from organvm-engine"
  - type: schema
    source: META-ORGANVM
    description: "Uses JSON Schema definitions from schema-definitions"

subscriptions:
