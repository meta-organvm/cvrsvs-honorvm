# seed.yaml — Automation Contract for meta-organvm/cvrsvs-honorvm
# Schema: seed/v1.0

schema_version: "1.0"
organ: Meta
organ_name: Meta
repo: cvrsvs-honorvm
org: meta-organvm

metadata:
